name: e2e tests

on:
  workflow_call:

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: astro-build-folder
          path: ${{ vars.APP_BUILD_FOLDER }}

      - name: Install Playwright Browsers & Linux System Deps
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          CV_PDF_NAME_FILE: ${{ vars.CV_PDF_NAME_FILE }}
          ID_GITHUB: ${{ vars.ID_GITHUB }}
          ID_LINKEDIN: ${{ vars.ID_LINKEDIN }}
          MAILTO_EMAIL: ${{ vars.MAILTO_EMAIL }}
          PHONE_NUMBER: ${{ vars.PHONE_NUMBER }}

      - name: Upload Playwright Report (On Failure Only)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
