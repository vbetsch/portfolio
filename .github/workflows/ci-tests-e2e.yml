name: e2e tests

on:
  workflow_call:
    secrets:
      HOSTING_PROVIDER_BASE_URL:
        required: false

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    environment: ${{ secrets.HOSTING_PROVIDER_BASE_URL && 'preview' || 'post-build' }}
    timeout-minutes: 5
    env:
      TEST_CONTEXT: ${{ secrets.HOSTING_PROVIDER_BASE_URL && 'preview' || 'post-build' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Download Build Artifact
        if: ${{ env.TEST_CONTEXT == 'post-build' }}
        uses: actions/download-artifact@v8
        with:
          name: astro-build-folder
          path: ${{ vars.APP_BUILD_FOLDER }}

      - name: Install Playwright Browsers & Linux System Deps
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ secrets.HOSTING_PROVIDER_BASE_URL }}
          APP_CV_PDF_NAME_FILE: ${{ vars.APP_CV_PDF_NAME_FILE }}
          APP_ID_GITHUB: ${{ vars.APP_ID_GITHUB }}
          APP_ID_LINKEDIN: ${{ vars.APP_ID_LINKEDIN }}
          APP_MAILTO_EMAIL: ${{ vars.APP_MAILTO_EMAIL }}
          APP_PHONE_NUMBER: ${{ vars.APP_PHONE_NUMBER }}

      - name: Upload Playwright Report (On Failure Only)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: ${{ env.TEST_CONTEXT == 'post-build' && 'playwright-report-local' || format('playwright-report-{0}', env.TEST_CONTEXT) }}
          path: playwright-report/
          retention-days: 7
