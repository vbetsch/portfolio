name: smoke e2e tests

on:
  workflow_call:
    secrets:
      HOSTING_PROVIDER_BASE_URL_PREVIEW:
        required: true

jobs:
  playwright:
    name: Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Install Playwright Browsers & Linux System Deps
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npm run test:e2e
        env:
          CI: true
          PLAYWRIGHT_BASE_URL: ${{ secrets.HOSTING_PROVIDER_BASE_URL_PREVIEW }}
          APP_CV_PDF_NAME_FILE: ${{ vars.APP_CV_PDF_NAME_FILE }}
          APP_ID_GITHUB: ${{ vars.APP_ID_GITHUB }}
          APP_ID_LINKEDIN: ${{ vars.APP_ID_LINKEDIN }}
          APP_MAILTO_EMAIL: ${{ vars.APP_MAILTO_EMAIL }}
          APP_PHONE_NUMBER: ${{ vars.APP_PHONE_NUMBER }}

      - name: Upload Playwright Report (On Failure Only)
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-preview
          path: playwright-report/
          retention-days: 7
