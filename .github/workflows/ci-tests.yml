name: tests

on:
  workflow_call:

jobs:
  unit:
    name: Units
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Run tests with coverage
        run: npm run test:cov
