name: deploy

on:
  workflow_call:
    secrets:
      HOSTING_PROVIDER_ACCESS_KEY:
        required: true
      HOSTING_PROVIDER_SECRET_KEY:
        required: true
      HOSTING_PROVIDER_ENDPOINT_URL:
        required: true
      HOSTING_PROVIDER_DEFAULT_REGION:
        required: true
      HOSTING_PROVIDER_BUCKET_NAME:
        required: true

jobs:
  deploy_on_preview:
    name: Preview
    if: github.event_name == 'pull_request' && success()
    runs-on: ubuntu-latest
    environment: preview

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy with Composite Action
        uses: ./.github/actions/s3-deploy
        env:
          ACCESS_KEY: ${{ secrets.HOSTING_PROVIDER_ACCESS_KEY }}
          SECRET_KEY: ${{ secrets.HOSTING_PROVIDER_SECRET_KEY }}
          ENDPOINT_URL: ${{ secrets.HOSTING_PROVIDER_ENDPOINT_URL }}
          DEFAULT_REGION: ${{ secrets.HOSTING_PROVIDER_DEFAULT_REGION }}
          BUCKET_NAME: ${{ secrets.HOSTING_PROVIDER_BUCKET_NAME }}
          BUILD_FOLDER: ${{ vars.APP_BUILD_FOLDER }}
