name: deploy
on:
  push:
    branches:
      - '**'

jobs:
  scaleway:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      CV_PDF_NAME_FILE: ${{ vars.CV_PDF_NAME_FILE }}
      ID_GITHUB: ${{ vars.ID_GITHUB }}
      ID_LINKEDIN: ${{ vars.ID_LINKEDIN }}
      MAILTO_EMAIL: ${{ vars.MAILTO_EMAIL }}
      PHONE_NUMBER: ${{ vars.PHONE_NUMBER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Build application
        run: npm run build

      - name: Deploy to Scaleway Object Storage on production
        # if: github.ref == 'refs/heads/main' && success()
        uses: s3-actions/s3-sync-action@v0.5.1
        with:
          args: --delete
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.SCALEWAY_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.SCALEWAY_SECRET_KEY }}
          AWS_REGION: 'fr-par'
          AWS_S3_ENDPOINT: 'https://s3.fr-par.scw.cloud'
          AWS_S3_BUCKET: ${{ secrets.SCALEWAY_BUCKET_NAME }}
          SOURCE_DIR: 'dist'
