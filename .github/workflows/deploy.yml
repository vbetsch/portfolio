name: deploy
on:
  push:
    branches:
      - '**'

jobs:
  scaleway:
    name: Deploy
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.SCALEWAY_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.SCALEWAY_SECRET_KEY }}
      AWS_DEFAULT_REGION: fr-par
      CV_PDF_NAME_FILE: ${{ vars.CV_PDF_NAME_FILE }}
      ID_GITHUB: ${{ vars.ID_GITHUB }}
      ID_LINKEDIN: ${{ vars.ID_LINKEDIN }}
      MAILTO_EMAIL: ${{ vars.MAILTO_EMAIL }}
      PHONE_NUMBER: ${{ vars.PHONE_NUMBER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Build application
        run: npm run build

      - name: Deploy to Scaleway Develop
        run: |
          aws s3 sync dist/ s3://$BUCKET_NAME --endpoint-url https://s3.fr-par.scw.cloud --delete
        env:
          BUCKET_NAME: ${{ secrets.SCALEWAY_BUCKET_DEVELOP }}

      - name: Deploy to Scaleway Preview
        run: |
          aws s3 sync dist/ s3://$BUCKET_NAME --endpoint-url https://s3.fr-par.scw.cloud --delete
        env:
          BUCKET_NAME: ${{ secrets.SCALEWAY_BUCKET_PREVIEW }}

      - name: Deploy to Scaleway Prod
        run: |
          aws s3 sync dist/ s3://$BUCKET_NAME --endpoint-url https://s3.fr-par.scw.cloud --delete
        env:
          BUCKET_NAME: ${{ secrets.SCALEWAY_BUCKET_PROD }}
