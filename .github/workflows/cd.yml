name: CD

on:
  push:
    branches: ['master', 'develop']
    paths-ignore:
      - '.vscode/**'
      - 'docs/**'
      - 'tests/**'
      - '.editorconfig'
      - '.gitignore'
      - '.lighthouserc.json'
      - '.prettier*'
      - 'README.md'
      - 'eslint.config.mjs'
      - 'playwright.config.ts'
      - 'vitest.config.ts'

jobs:
  run-build:
    name: Build
    uses: ./.github/workflows/_build.yml

  run-deployment:
    name: Deployment
    needs: run-build
    uses: ./.github/workflows/cd-deployment.yml
    secrets:
      HOSTING_PROVIDER_ACCESS_KEY: ${{ secrets.HOSTING_PROVIDER_ACCESS_KEY }}
      HOSTING_PROVIDER_SECRET_KEY: ${{ secrets.HOSTING_PROVIDER_SECRET_KEY }}
      HOSTING_PROVIDER_ENDPOINT_URL: ${{ secrets.HOSTING_PROVIDER_ENDPOINT_URL }}
      HOSTING_PROVIDER_DEFAULT_REGION: ${{ secrets.HOSTING_PROVIDER_DEFAULT_REGION }}
      HOSTING_PROVIDER_BUCKET_NAME: ${{ secrets.HOSTING_PROVIDER_BUCKET_NAME }}

  run-web-vitals:
    name: Web Vitals
    needs: run-deployment
    uses: ./.github/workflows/cd-web-vitals.yml
    secrets:
      HOSTING_PROVIDER_BASE_URL: ${{ secrets.HOSTING_PROVIDER_BASE_URL }}

  run-tests-setup:
    name: Setup for tests
    uses: ./.github/workflows/_tests-setup.yml

  run-tests-smoke:
    name: Smoke Tests
    needs: [run-build, run-tests-setup, run-deployment]
    uses: ./.github/workflows/cd-tests-smoke.yml
    with:
      playwright-version: ${{ needs.run-tests-setup.outputs.playwright-version }}
    secrets:
      HOSTING_PROVIDER_BASE_URL: ${{ secrets.HOSTING_PROVIDER_BASE_URL }}
