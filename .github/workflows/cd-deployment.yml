name: deployment

on:
  workflow_call:
    secrets:
      HOSTING_PROVIDER_ACCESS_KEY:
        required: true
      HOSTING_PROVIDER_SECRET_KEY:
        required: true
      HOSTING_PROVIDER_ENDPOINT_URL:
        required: true
      HOSTING_PROVIDER_DEFAULT_REGION:
        required: true
      HOSTING_PROVIDER_BUCKET_NAME:
        required: true

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.HOSTING_PROVIDER_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.HOSTING_PROVIDER_SECRET_KEY }}
  AWS_DEFAULT_REGION: ${{ secrets.HOSTING_PROVIDER_DEFAULT_REGION }}
  BUILD_FOLDER: ${{ vars.APP_BUILD_FOLDER }}
  ENDPOINT_URL: ${{ secrets.HOSTING_PROVIDER_ENDPOINT_URL }}
  BUCKET_NAME: ${{ secrets.HOSTING_PROVIDER_BUCKET_NAME }}

jobs:
  develop:
    name: Deploy on Develop
    if: github.ref == 'refs/heads/develop' && success()
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: astro-build-folder
          path: ${{ env.BUILD_FOLDER }}

      - name: Deploy on Develop environment
        run: |
          aws s3 sync $BUILD_FOLDER/ s3://$BUCKET_NAME --endpoint-url $ENDPOINT_URL --delete

  prod:
    name: Deploy on Production
    if: github.ref == 'refs/heads/master' && success()
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: astro-build-folder
          path: ${{ env.BUILD_FOLDER }}

      - name: Deploy on Production environment
        run: |
          aws s3 sync $BUILD_FOLDER/ s3://$BUCKET_NAME --endpoint-url $ENDPOINT_URL --delete
