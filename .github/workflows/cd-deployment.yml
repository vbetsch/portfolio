name: deployment

on:
  workflow_call:
    secrets:
      HOSTING_PROVIDER_ACCESS_KEY:
        required: true
      HOSTING_PROVIDER_SECRET_KEY:
        required: true
      HOSTING_PROVIDER_ENDPOINT_URL:
        required: true
      HOSTING_PROVIDER_DEFAULT_REGION:
        required: true
      HOSTING_PROVIDER_BUCKET_NAME:
        required: true

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.HOSTING_PROVIDER_ACCESS_KEY }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.HOSTING_PROVIDER_SECRET_KEY }}
  ENDPOINT_URL: ${{ secrets.HOSTING_PROVIDER_ENDPOINT_URL }}
  AWS_DEFAULT_REGION: ${{ secrets.HOSTING_PROVIDER_DEFAULT_REGION }}
  BUCKET_NAME: ${{ secrets.HOSTING_PROVIDER_BUCKET_NAME }}
  BUILD_FOLDER: ${{ vars.APP_BUILD_FOLDER }}

jobs:
  develop:
    name: Develop
    if: github.ref == 'refs/heads/develop' && success()
    runs-on: ubuntu-latest
    environment: develop

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy with Composite Action
        uses: ./.github/actions/s3-deploy
        with:
          access_key: ${{ env.AWS_ACCESS_KEY_ID }}
          secret_key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          endpoint_url: ${{ env.ENDPOINT_URL }}
          default_region: ${{ env.AWS_DEFAULT_REGION }}
          bucket_name: ${{ env.BUCKET_NAME }}
          build_folder: ${{ env.BUILD_FOLDER }}

  prod:
    name: Production
    if: github.ref == 'refs/heads/master' && success()
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy with Composite Action
        uses: ./.github/actions/s3-deploy
        with:
          access_key: ${{ env.AWS_ACCESS_KEY_ID }}
          secret_key: ${{ env.AWS_SECRET_ACCESS_KEY }}
          endpoint_url: ${{ env.ENDPOINT_URL }}
          default_region: ${{ env.AWS_DEFAULT_REGION }}
          bucket_name: ${{ env.BUCKET_NAME }}
          build_folder: ${{ env.BUILD_FOLDER }}
