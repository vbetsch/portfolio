name: deployment

on:
  workflow_call:
    secrets:
      HOSTING_PROVIDER_ACCESS_KEY:
        required: true
      HOSTING_PROVIDER_SECRET_KEY:
        required: true
      HOSTING_PROVIDER_BUCKET_DEVELOP:
        required: true
      HOSTING_PROVIDER_BUCKET_PROD:
        required: true
      HOSTING_PROVIDER_ENDPOINT_URL:
        required: true

jobs:
  scaleway:
    name: Deploy on Scaleway
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.HOSTING_PROVIDER_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.HOSTING_PROVIDER_SECRET_KEY }}
      AWS_DEFAULT_REGION: fr-par
      BUILD_FOLDER: ${{ vars.APP_BUILD_FOLDER }}
      ENDPOINT_URL: ${{ secrets.HOSTING_PROVIDER_ENDPOINT_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Download Build Artifact
        uses: actions/download-artifact@v8
        with:
          name: astro-build-folder
          path: ${{ env.BUILD_FOLDER }}

      - name: Deploy to Develop
        if: github.ref == 'refs/heads/develop' && success()
        run: |
          aws s3 sync $BUILD_FOLDER/ s3://$BUCKET_NAME --endpoint-url $ENDPOINT_URL --delete
        env:
          BUCKET_NAME: ${{ secrets.HOSTING_PROVIDER_BUCKET_DEVELOP }}

      - name: Deploy to Prod
        if: github.ref == 'refs/heads/master' && success()
        run: |
          aws s3 sync $BUILD_FOLDER/ s3://$BUCKET_NAME --endpoint-url $ENDPOINT_URL --delete
        env:
          BUCKET_NAME: ${{ secrets.HOSTING_PROVIDER_BUCKET_PROD }}
