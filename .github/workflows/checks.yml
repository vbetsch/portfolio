name: checks

on:
  workflow_call:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Setup project
        uses: ./.github/actions/setup-project

  tsc:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Check typescript
        run: npm run check:tsc

  astro:
    runs-on: ubuntu-latest
    needs: setup

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup project
        uses: ./.github/actions/setup-project

      - name: Check Astro
        run: npm run check:astro
