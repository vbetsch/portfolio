name: checks

on:
  workflow_call:

jobs:
  tsc:
    name: TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Check typescript
        run: npm run check:tsc

  astro:
    name: Astro
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Env & Node
        uses: ./.github/actions/setup-project

      - name: Check Astro
        run: npm run check:astro
