name: CI

on:
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '.vscode/**'
      - 'docs/**'
      - '.editorconfig'
      - '.env.example'
      - '.gitignore'
      - 'README.md'

jobs:
  run-checks:
    name: Checks
    uses: ./.github/workflows/checks.yml

  run-lint:
    name: Linter
    uses: ./.github/workflows/lint.yml

  run-tests:
    name: Tests
    uses: ./.github/workflows/tests.yml

  run-build:
    name: Build
    uses: ./.github/workflows/build.yml
