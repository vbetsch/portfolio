name: CI

on:
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '.vscode/**'
      - 'docs/**'
      - '.editorconfig'
      - '.env.example'
      - '.gitignore'
      - 'README.md'

jobs:
  run-checks:
    name: Quality
    uses: ./.github/workflows/ci/quality.yml

  run-tests:
    name: Tests
    uses: ./.github/workflows/ci/tests.yml

  run-build:
    name: Build
    uses: ./.github/workflows/ci/build.yml
