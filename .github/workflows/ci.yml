name: CI

on:
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '.vscode/**'
      - 'docs/**'
      - '.editorconfig'
      - '.env.example'
      - '.gitignore'
      - 'README.md'

jobs:
  run-quality:
    name: Quality
    uses: ./.github/workflows/ci-quality.yml

  run-unit-tests:
    name: Unit Tests
    uses: ./.github/workflows/ci-unit-tests.yml

  run-build-and-e2e:
    name: Build & E2E
    uses: ./.github/workflows/ci-build-and-e2e.yml
    needs: [run-quality, run-unit-tests]
