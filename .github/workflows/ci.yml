name: CI

on:
  pull_request:
    paths-ignore:
      - '.vscode/**'
      - 'docs/**'
      - '.editorconfig'
      - '.gitignore'
      - 'README.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  run-build:
    name: Build
    uses: ./.github/workflows/_build.yml

  run-linter:
    name: Linter
    uses: ./.github/workflows/ci-linter.yml

  run-tests-unit:
    name: Unit Tests
    uses: ./.github/workflows/ci-tests-unit.yml

  run-tests-setup:
    name: Setup for tests
    uses: ./.github/workflows/_tests-setup.yml

  run-tests-playwright:
    name: Local Playwright Tests
    needs: [run-build, run-tests-setup]
    uses: ./.github/workflows/ci-tests-playwright.yml
    with:
      playwright-version: ${{ needs.run-tests-setup.outputs.playwright-version }}

  run-tests-seo:
    name: SEO Tests
    needs: run-build
    uses: ./.github/workflows/ci-tests-seo.yml

  run-web-vitals:
    name: Web Vitals
    needs: run-build
    uses: ./.github/workflows/ci-web-vitals.yml

  run-deploy:
    name: Deploy
    needs: run-build
    uses: ./.github/workflows/ci-deploy.yml
    secrets:
      HOSTING_PROVIDER_ACCESS_KEY: ${{ secrets.HOSTING_PROVIDER_ACCESS_KEY }}
      HOSTING_PROVIDER_SECRET_KEY: ${{ secrets.HOSTING_PROVIDER_SECRET_KEY }}
      HOSTING_PROVIDER_ENDPOINT_URL: ${{ secrets.HOSTING_PROVIDER_ENDPOINT_URL }}
      HOSTING_PROVIDER_DEFAULT_REGION: ${{ secrets.HOSTING_PROVIDER_DEFAULT_REGION }}
      HOSTING_PROVIDER_BUCKET_NAME: ${{ secrets.HOSTING_PROVIDER_BUCKET_NAME }}

  run-tests-smoke:
    name: Smoke Tests
    needs: [run-build, run-tests-setup, run-deploy]
    uses: ./.github/workflows/ci-tests-smoke.yml
    with:
      playwright-version: ${{ needs.run-tests-setup.outputs.playwright-version }}
    secrets:
      HOSTING_PROVIDER_BASE_URL: ${{ secrets.HOSTING_PROVIDER_BASE_URL_PREVIEW }}
