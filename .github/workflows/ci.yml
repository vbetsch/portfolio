name: Continuous Integration

on:
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '.vscode/**'
      - 'docs/**'
      - '.editorconfig'
      - '.env.example'
      - '.gitignore'
      - 'README.md'

jobs:
  run-checks:
    uses: ./.github/workflows/checks.yml

  run-lint:
    uses: ./.github/workflows/lint.yml

  run-tests:
    uses: ./.github/workflows/tests.yml

  run-build:
    uses: ./.github/workflows/build.yml
