name: CI

on:
  pull_request:
    branches:
      - '**'
    paths-ignore:
      - '.vscode/**'
      - 'docs/**'
      - '.editorconfig'
      - '.gitignore'
      - 'README.md'

jobs:
#  run-linter:
#    name: Linter
#    uses: ./.github/workflows/ci-linter.yml
#
#  run-unit-tests:
#    name: Unit Tests
#    uses: ./.github/workflows/ci-unit-tests.yml
#
#  run-production:
#    name: Production
#    uses: ./.github/workflows/ci-production.yml

  run-deployment:
    name: Deployment
    uses: ./.github/workflows/ci-deploy.yml
    secrets:
      SCALEWAY_ACCESS_KEY: ${{ secrets.SCALEWAY_ACCESS_KEY }}
      SCALEWAY_SECRET_KEY: ${{ secrets.SCALEWAY_SECRET_KEY }}
      SCALEWAY_BUCKET_DEVELOP: ${{ secrets.SCALEWAY_BUCKET_DEVELOP }}
