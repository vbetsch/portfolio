name: 'Web Vitals'
description: 'Audit SEO, Accessibility and Performance'

runs:
  using: 'composite'
  steps:
    - name: Restore Env & Node
      uses: ./.github/actions/setup-project

    - name: Download Build Artifact
      uses: actions/download-artifact@v8
      with:
        name: astro-build-folder
        path: ${{ env.BUILD_FOLDER }}

    - name: Audit SEO, Accessibility and Performance
      run: npm run lighthouse

    - name: Upload Lighthouse Report (On Failure Only)
      uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: lighthouse-report
        path: lighthouse-report/
        retention-days: 7
